name: Remote Build and Deploy
on:
  workflow_dispatch:
      inputs:
        source_ref:
          description: 'Enter ref for ofs69/syncpathy. Branch or tag'
          required: true
          default: 'main'
          type: string

jobs:
  build-remote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Pages Repo
        uses: actions/checkout@v4
          
      - name: Checkout Flutter Source
        uses: actions/checkout@v4
        with:
          repository: ofs69/syncopathy
          path: flutter_source
          ref: ${{ inputs.source_ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create config file
        shell: bash
        run: |
          echo '{ "HANDY_APPLICATION_ID": "${{ secrets.HANDY_APPLICATION_ID }}" }' > config.json

      - name: Build JS
        working-directory: ./flutter_source
        run: |
          flutter pub get
          flutter build web --no-wasm-dry-run  --release --base-href "/syncopathy-web/" --dart-define-from-file=config.json

      - name: Cache Busting
        run: |
          sed -i 's/flutter_bootstrap.js/flutter_bootstrap.js?v=${{ github.run_id }}/g' flutter_source/build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: flutter_source/build/web
          branch: gh-pages # It's best to deploy to a separate branch like gh-pages
          clean: true